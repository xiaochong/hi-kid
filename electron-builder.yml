appId: fun.hikid.app
productName: HiKid
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: HiKid
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  # Set to true before distribution: hardenedRuntime, gatekeeperAssess, notarize
  hardenedRuntime: false
  gatekeeperAssess: false
  extendInfo:
    - NSCameraUsageDescription: HiKid needs camera access (future feature).
    - NSMicrophoneUsageDescription: HiKid needs microphone access to listen and practice English with you.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: xiaochong
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish: null
