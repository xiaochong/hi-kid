<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>HiKid</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!--
      CSS modules in dev mode require 'unsafe-inline' for hot-reload injection.
      In production builds, Vite extracts CSS to files so this could be removed.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'none';"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
